name: Update Tour Dates

on:
  schedule:
    - cron: "0 15 * * *"  # Daily 3pm UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Run tour date scraper
        run: node scripts/scrape-tour-dates.js

      - name: Commit updated tour dates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tour-dates.json
          if git diff --staged --quiet; then
            echo "No changes to tour dates — skipping commit."
          else
            git commit -m "chore: update tour dates from punchup.live [skip ci]"
            git push
          fi
